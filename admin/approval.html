<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JEF HRIS — HR Dashboard</title>
  <meta name="theme-color" content="#FFB703">
  <link rel="icon" type="image/png" href="../img/logomark.png">
  <link rel="manifest" href="../json/manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap"
    rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css">
  <script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script>
    // Immediate Theme Sync
    (function () {
      const savedTheme = localStorage.getItem('hris_theme') || 'dark';
      document.documentElement.setAttribute('data-theme', savedTheme);
    })();
  </script>
</head>

<body class="admin-layout">

  <!-- PAGE LOADER -->
  <div id="pageLoader" class="page-loader">
    <div class="spinner-circle"></div>
  </div>


  <div class="bg-animated">
    <div class="bg-orb bg-orb-1"></div>
    <div class="bg-orb bg-orb-2"></div>
    <div class="bg-grid"></div>
  </div>

  <div class="admin-layout">

    <div id="adminSidebarMount"></div>

    <main class="admin-main">
      <div id="adminTopbarMount"></div>

      <div class="admin-content">


        <!-- APPROVAL PAGE -->
        <section class="page-section active fade-in" id="page-approval">
          <div class="card admin-menu-card">
            <div class="admin-card-actions">
              <button class="btn btn-sm btn-ghost" onclick="loadApprovals()"><i class="bi bi-arrow-clockwise"></i>
                Refresh</button>
            </div>

            <div class="table-wrap" style="max-height: 380px; overflow-y: auto;">
              <table>
                <thead id="approvalThead">
                  <tr>
                    <th style="cursor:pointer;" onclick="sortApprovalsTable('user_name')" data-sort="user_name">Karyawan <i class="bi bi-arrow-down-up bi-sort-icon" style="font-size:10px; margin-left:4px; opacity:0.35;"></i></th>
                    <th style="cursor:pointer;" onclick="sortApprovalsTable('type')" data-sort="type">Jenis <i class="bi bi-arrow-down-up bi-sort-icon" style="font-size:10px; margin-left:4px; opacity:0.35;"></i></th>
                    <th style="cursor:pointer;" onclick="sortApprovalsTable('start_date')" data-sort="start_date">Dari Tanggal <i class="bi bi-arrow-down-up bi-sort-icon" style="font-size:10px; margin-left:4px; opacity:0.35;"></i></th>
                    <th style="cursor:pointer;" onclick="sortApprovalsTable('end_date')" data-sort="end_date">Hingga Tanggal <i class="bi bi-arrow-down-up bi-sort-icon" style="font-size:10px; margin-left:4px; opacity:0.35;"></i></th>
                    <th>Catatan</th>
                    <th>Dokumen</th>
                    <th style="cursor:pointer;" onclick="sortApprovalsTable('status')" data-sort="status">Status <i class="bi bi-arrow-down-up bi-sort-icon" style="font-size:10px; margin-left:4px; opacity:0.35;"></i></th>
                    <th>Keputusan</th>
                    <th>Aksi</th>
                  </tr>
                </thead>
                <tbody id="approvalBody">
                  <tr>
                    <td colspan="9" style="text-align:center;padding:30px">Memuat pengajuan...</td>
                  </tr>
                </tbody>
              </table>
            </div>
          </div>
        </section>

      </div>
    </main>
  </div>

  <!-- MODALS -->

  <!-- Modal User -->
  <div class="overlay hidden" id="modalUser">
    <div class="modal border-animated-modal" style="max-width: 480px;">
      <div class="card-border-glow"></div>
      <div class="modal-header" style="position:relative; z-index:2;">
        <h3 class="modal-title" id="modalUserTitle"><i class="bi bi-person-fill-add text-primary" style="margin-right:8px"></i> Tambah Karyawan</h3>
        <button class="modal-close" onclick="closeModal('modalUser')"><i class="bi bi-x"></i></button>
      </div>
      <form id="adminUserForm" onsubmit="event.preventDefault(); saveUser();" style="display:contents;">
        <input type="hidden" id="modalUserId">

        <div class="modal-body" style="position:relative; z-index:2;">
          <div class="avatar-upload-group">
            <div class="avatar-preview-wrapper">
              <img id="mu_preview" class="avatar-preview-img"
                src="/img/profile.png"
                alt="Preview" onerror="this.src='/img/profile.png'; this.onerror=null;">
              <label for="mu_file" class="avatar-edit-btn">
                <i class="bi bi-camera-fill"></i>
              </label>
            </div>
            <input type="file" id="mu_file" hidden accept="image/*" onchange="previewAvatar(this)">
            <p style="font-size:11px; color:var(--text-muted)">Klik ikon kamera untuk ganti foto</p>
          </div>

          <div class="form-group">
            <label class="form-label">Nama Lengkap</label>
            <input type="text" class="form-control" id="mu_name" required placeholder="Nama karyawan">
          </div>
          <div class="form-group">
            <label class="form-label">Email</label>
            <input type="email" class="form-control" id="mu_email" required placeholder="email@jefgroup.com">
          </div>
          <div class="form-group">
            <label class="form-label">PIN / Password</label>
            <input type="text" class="form-control" id="mu_pin" placeholder="Kosongkan jika tidak diubah">
          </div>
          <div class="form-group">
            <label class="form-label">Jabatan</label>
            <input type="text" class="form-control" id="mu_position" required placeholder="Contoh: Content Creator">
          </div>
          <div class="form-group">
            <label class="form-label">Divisi</label>
            <select class="form-control" id="mu_division" required>
              <option value="Umum" selected>Umum</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Role Akses</label>
            <select class="form-control" id="mu_role" required>
              <option value="Employee">Employee</option>
              <option value="Admin">Admin</option>
            </select>
          </div>
        </div>

        <div class="modal-footer" style="position:relative; z-index:2;">
          <button type="button" class="btn btn-ghost" onclick="closeModal('modalUser')">Batal</button>
          <button type="submit" class="btn btn-primary">Simpan</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Modal Task -->
  <div class="overlay hidden" id="modalTask">
    <div class="modal border-animated-modal" style="max-width:500px;">
      <div class="card-border-glow"></div>
      <div class="modal-header" style="position:relative; z-index:2;">
        <h3 class="modal-title" id="modalTaskTitle"><i class="bi bi-list-task text-primary"
            style="margin-right:8px"></i> Tambah Tugas</h3>
        <button class="modal-close" onclick="closeModal('modalTask')"><i class="bi bi-x"></i></button>
      </div>
      <form id="adminTaskForm" onsubmit="saveAdminTask(event)" style="display:contents;">
        <input type="hidden" id="modalTaskId">
        <div class="modal-body" style="position:relative; z-index:2;">
          <div class="form-group">
            <label class="form-label">Karyawan</label>
            <select class="form-control" id="modalTaskUser" required>
              <!-- Populated dynamically with active employees -->
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Nama / Judul Tugas*</label>
            <input type="text" class="form-control" id="modalTaskName" required placeholder="Nama Tugas">
          </div>
          <div class="form-group">
            <label class="form-label">Target / Goals*</label>
            <input type="text" class="form-control" id="modalTaskTarget" required placeholder="Target Pencapaian">
          </div>
          <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:18px;">
            <div class="form-group" style="margin-bottom:0;">
              <label class="form-label">Mulai Jam*</label>
              <input type="time" class="form-control" id="modalTaskStartTime" required>
            </div>
            <div class="form-group" style="margin-bottom:0;">
              <label class="form-label">Selesai Jam*</label>
              <input type="time" class="form-control" id="modalTaskEndTime" required>
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">Output Yang Dihasilkan*</label>
            <input type="text" class="form-control" id="modalTaskOutput" required
              placeholder="Contoh: File Excel Laporan.xlsx">
          </div>
          <div class="form-group">
            <label class="form-label">Status Tugas*</label>
            <select class="form-control" id="modalTaskStatus" required>
              <option value="Pending">Belum Selesai (Pending)</option>
              <option value="Completed">Selesai (Completed)</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Catatan / Issue</label>
            <textarea class="form-control" id="modalTaskNotes" rows="2"
              placeholder="Catatan issue jika ada..."></textarea>
          </div>
          <div class="form-group">
            <label class="form-label">Lainnya</label>
            <textarea class="form-control" id="modalTaskOthers" rows="2" placeholder="Info lainnya..."></textarea>
          </div>
          <div class="form-group">
            <label class="form-label">Kategori</label>
            <select class="form-control" id="modalTaskCategory" required>
              <option value="Development">Development</option>
              <option value="Operations">Operations</option>
              <option value="Marketing">Marketing</option>
              <option value="Administrative">Administrative</option>
              <option value="Sales">Sales</option>
              <option value="Other" selected>Lain-lain (Other)</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Tanggal</label>
            <input type="date" class="form-control" id="modalTaskDate" required>
          </div>
          <div class="form-group">
            <label class="form-label">Productivity Score (0 - 100)</label>
            <input type="number" class="form-control" id="modalTaskScore" min="0" max="100"
              placeholder="Skor produktivitas (contoh: 85)">
          </div>
          <div class="form-group">
            <label class="form-label">Ganti Lampiran Dokumen/Gambar (Opsional)</label>
            <input type="file" class="form-control" id="modalTaskFile"
              accept="image/*,application/pdf,application/msword,application/vnd.openxmlformats-officedocument.wordprocessingml.document,application/vnd.ms-excel,application/vnd.openxmlformats-officedocument.spreadsheetml.sheet">
          </div>
        </div>
        <div class="modal-footer" style="position:relative; z-index:2;">
          <button type="button" class="btn btn-ghost" onclick="closeModal('modalTask')">Batal</button>
          <button type="submit" class="btn btn-primary" id="btnSaveTask">Simpan</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Modal Photo -->
  <div class="overlay hidden" id="modalPhoto">
    <div class="modal">
      <div class="modal-header">
        <h3 class="modal-title"><i class="bi bi-camera-fill text-primary" style="margin-right:8px"></i> Foto Selfie</h3>
        <button class="modal-close" onclick="closeModal('modalPhoto')"><i class="bi bi-x"></i></button>
      </div>
      <img id="modalPhotoImg" class="photo-preview" src="" alt="Foto absensi">
    </div>
  </div>

  <!-- Modal Document -->
  <div class="overlay hidden" id="modalDoc">
    <div class="modal modal-lg"
      style="max-width: 600px; width: 95%; max-height:90vh; display:flex; flex-direction:column; padding:24px;">
      <div class="modal-header" style="flex-shrink:0; margin-bottom:16px;">
        <h3 class="modal-title"><i class="bi bi-file-earmark-text-fill text-primary" style="margin-right:8px"></i>
          Preview Lampiran</h3>
        <button class="modal-close" onclick="closeModal('modalDoc')"><i class="bi bi-x"></i></button>
      </div>
      <div class="modal-body" id="modalDocBody"
        style="flex:1; overflow-y:auto; padding:0; display:flex; align-items:center; justify-content:center; background:rgba(0,0,0,0.15); border-radius:12px; min-height:350px;">
        <!-- Embedded Content -->
      </div>
    </div>
  </div>

  <!-- Modal View Task Admin -->
  <div class="overlay hidden" id="modalViewTaskAdmin">
    <div class="modal modal-lg"
      style="max-width: 550px; width: 95%; max-height:90vh; display:flex; flex-direction:column; padding:24px;">
      <div class="modal-header" style="flex-shrink:0; margin-bottom:16px;">
        <h3 class="modal-title" id="modalViewTaskAdminTitle">
          <i class="bi bi-journal-text text-primary" style="margin-right:8px"></i> Detail Tugas &amp; Produktivitas
        </h3>
        <button class="modal-close" onclick="closeModal('modalViewTaskAdmin')"><i class="bi bi-x"></i></button>
      </div>
      <div class="modal-body" id="modalViewTaskAdminBody"
        style="flex:1; overflow-y:auto; padding:0; display:flex; flex-direction:column; gap:16px;">
        <!-- Filled dynamically by script.js -->
      </div>
      <div class="modal-footer"
        style="padding-top:16px; margin-top:16px; border-top:1px solid var(--border); display:flex; justify-content:flex-end;">
        <button type="button" class="btn btn-primary" onclick="closeModal('modalViewTaskAdmin')"
          style="border-radius:50px; padding:8px 20px; font-weight:700;">Tutup</button>
      </div>
    </div>
  </div>

  <!-- Modal Edit Approval -->
  <div class="overlay hidden" id="modalEditApproval">
    <div class="modal border-animated-modal" style="max-width: 450px;">
      <div class="card-border-glow"></div>
      <div class="modal-header" style="position:relative; z-index:2;">
        <h3 class="modal-title"><i class="bi bi-pencil-square text-primary" style="margin-right:8px"></i> Edit Pengajuan</h3>
        <button class="modal-close" onclick="closeModal('modalEditApproval')"><i class="bi bi-x"></i></button>
      </div>
      <form id="formEditApproval" onsubmit="saveEditApproval(event)" style="display:contents;">
        <input type="hidden" id="editAppId">
        <div class="modal-body" style="position:relative; z-index:2;">
          <div class="form-group">
            <label class="form-label">Nama Karyawan</label>
            <input type="text" class="form-control" id="editAppName" readonly style="background:rgba(0,0,0,0.06); color:var(--text-muted); cursor:not-allowed;">
          </div>
          <div class="form-group">
            <label class="form-label">Jenis</label>
            <select class="form-control" id="editAppType" required>
              <option value="Cuti">Cuti</option>
              <option value="Sakit">Sakit</option>
              <option value="Izin">Izin</option>
            </select>
          </div>
          <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:18px;">
            <div class="form-group" style="margin-bottom:0;">
              <label class="form-label">Dari Tanggal</label>
              <input type="date" class="form-control" id="editAppStart" required>
            </div>
            <div class="form-group" style="margin-bottom:0;">
              <label class="form-label">Hingga Tanggal</label>
              <input type="date" class="form-control" id="editAppEnd" required>
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">Catatan</label>
            <textarea class="form-control" id="editAppReason" rows="2" required></textarea>
          </div>
          <div class="form-group">
            <label class="form-label">Status</label>
            <select class="form-control" id="editAppStatus" required>
              <option value="Pending">Menunggu</option>
              <option value="Approved">Disetujui</option>
              <option value="Rejected">Ditolak</option>
            </select>
          </div>
        </div>
        <div class="modal-footer" style="position:relative; z-index:2;">
          <button type="button" class="btn btn-ghost" onclick="closeModal('modalEditApproval')">Batal</button>
          <button type="submit" class="btn btn-primary">Simpan</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Modal Adjust Quota -->
  <div class="overlay hidden" id="modalAdjustQuota">
    <div class="modal border-animated-modal" style="max-width:400px;">
      <div class="card-border-glow"></div>
      <div class="modal-header" style="position:relative; z-index:2;">
        <h3 class="modal-title"><i class="bi bi-calendar-check-fill text-primary" style="margin-right:8px"></i>
          Sesuaikan Jatah Cuti</h3>
        <button class="modal-close" onclick="closeModal('modalAdjustQuota')"><i class="bi bi-x"></i></button>
      </div>
      <form id="formAdjustQuota" onsubmit="submitAdjustQuota(event)" style="display:contents;">
        <input type="hidden" id="adjustUserId">
        <div class="modal-body" style="position:relative; z-index:2;">
          <div class="form-group">
            <label class="form-label">Nama Karyawan</label>
            <input type="text" class="form-control" id="adjustUserName" readonly
              style="background:rgba(0,0,0,0.06); color:var(--text-muted); cursor:not-allowed;">
          </div>
          <div class="form-group">
            <label class="form-label">Jatah Cuti Tahunan</label>
            <input type="number" class="form-control" id="adjustAllowedQuota" required min="0" max="365">
          </div>
        </div>
        <div class="modal-footer" style="position:relative; z-index:2;">
          <button type="button" class="btn btn-ghost" onclick="closeModal('modalAdjustQuota')">Batal</button>
          <button type="submit" class="btn btn-primary">Simpan</button>
        </div>
      </form>
    </div>
  </div>

  <div id="toast-container"></div>
  <script src="../js/script.js"></script>
  <script>
    // Initialize Dashboard Chart and Belum Absen Table
    window.renderChart = function (stats) {
      if (!document.getElementById('dashChart')) return;
      const ctx = document.getElementById('dashChart').getContext('2d');
      if (window.dashPie) window.dashPie.destroy();

      const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
      const textColor = isDark ? '#FFFFFF' : '#1E293B';
      const chartBorderColor = isDark ? '#13192E' : '#FFFFFF';

      window.dashPie = new Chart(ctx, {
        type: 'doughnut',
        data: {
          labels: ['Hadir', 'Terlambat', 'Cuti/Izin', 'Belum Absen'],
          datasets: [{
            data: [stats.hadir || 0, stats.terlambat || 0, stats.cuti || 0, stats.absen || 0],
            backgroundColor: [
              'rgba(34, 197, 94, 0.85)',
              'rgba(239, 68, 68, 0.85)',
              'rgba(59, 130, 246, 0.85)',
              'rgba(148, 163, 184, 0.75)'
            ],
            hoverBackgroundColor: [
              'rgba(34, 197, 94, 1)',
              'rgba(239, 68, 68, 1)',
              'rgba(59, 130, 246, 1)',
              'rgba(148, 163, 184, 0.95)'
            ],
            borderColor: chartBorderColor,
            borderWidth: 3,
            hoverOffset: 6
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: {
              position: 'bottom',
              labels: {
                color: textColor,
                padding: 16,
                usePointStyle: true,
                pointStyle: 'circle',
                font: { family: "'Plus Jakarta Sans', sans-serif", size: 11, weight: '600' }
              }
            },
            tooltip: {
              backgroundColor: 'rgba(26, 26, 26, 0.9)',
              titleColor: '#FFFFFF',
              bodyColor: '#E5E7EB',
              borderColor: 'rgba(255, 183, 3, 0.15)',
              borderWidth: 1,
              padding: 10,
              cornerRadius: 12,
              displayColors: true,
              usePointStyle: true,
              boxWidth: 8,
              boxHeight: 8
            }
          },
          cutout: '72%'
        }
      });
    }

    window.renderBelumAbsen = function (users) {
      const body = document.getElementById('belumAbsenBody');
      if (!body) return;
      if (!users || !users.length) {
        body.innerHTML = '<tr><td style="text-align:center;padding:20px;color:var(--text-muted)">Semua sudah absen</td></tr>';
        return;
      }
      body.innerHTML = users.map(u => `
        <tr>
          <td>
            <div class="user-cell" style="justify-content: flex-start; text-align: left;">
              ${(window.hasProfilePic && window.hasProfilePic(u.profile_pic_url)) ?
          `<img src="${getDirectDriveUrl(u.profile_pic_url)}" class="avatar avatar-sm" style="object-fit:cover" onerror="this.src='/img/profile.png'; this.onerror=null;">` :
          `<img src="/img/profile.png" class="avatar avatar-sm" style="object-fit:cover;">`
        }
              <div class="user-cell-info" style="text-align: left; display: flex; flex-direction: column; align-items: flex-start;">
                <span class="user-cell-name">${u.name}</span>
                <span class="user-cell-role">${u.position}</span>
              </div>
            </div>
          </td>
        </tr>
      `).join('');
    }
  </script>

  <script>
    // Run Page Initialization based on current admin section
    document.addEventListener('DOMContentLoaded', () => {
      if (typeof showPage === 'function') {
        const activePage = 'approval';
        showPage(activePage);
      }
    });

    window.addEventListener('load', () => {
      const loader = document.getElementById('pageLoader');
      if (loader) {
        loader.style.opacity = '0';
        setTimeout(() => loader.style.display = 'none', 500);
      }
    });
  </script>
</body>
</html>
