<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>JEF HRIS — Absensi</title>
  <meta name="theme-color" content="#FFB703">
  <link
    href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800;900&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap"
    rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <style>
    body {
      max-width: 480px;
      margin: 0 auto;
      background: var(--bg-deep)
    }

    .header {
      background: rgba(26, 26, 26, 0.95);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
      padding: 16px 18px;
      display: flex;
      align-items: center;
      gap: 14px;
      position: sticky;
      top: 0;
      z-index: 50
    }

    .back-btn {
      width: 38px;
      height: 38px;
      border-radius: var(--radius-sm);
      background: var(--bg-card);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-muted);
      font-size: 20px;
      text-decoration: none;
      flex-shrink: 0;
      transition: all var(--transition)
    }

    .back-btn:hover {
      border-color: var(--primary);
      color: var(--primary)
    }

    .header-info h2 {
      font-family: var(--font-head);
      font-weight: 800;
      font-size: 17px
    }

    .header-info p {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 1px
    }

    .content {
      padding: 18px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      padding-bottom: 36px
    }

    /* CLOCK WIDGET */
    .clock-widget {
      background: var(--bg-glass);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 28px 20px;
      text-align: center;
      backdrop-filter: blur(12px)
    }

    .clock-time {
      font-family: var(--font-head);
      font-weight: 900;
      font-size: 56px;
      letter-spacing: -3px;
      color: var(--text);
      font-variant-numeric: tabular-nums;
      line-height: 1;
      margin-bottom: 8px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text
    }

    .clock-date {
      font-size: 13px;
      color: var(--text-muted);
      font-weight: 500
    }

    /* LOCK BANNER */
    .lock-banner {
      display: none;
      background: rgba(245, 158, 11, 0.08);
      border: 1.5px solid rgba(245, 158, 11, 0.3);
      border-radius: var(--radius-md);
      padding: 16px 18px;
      align-items: flex-start;
      gap: 12px
    }

    .lock-banner.show {
      display: flex
    }

    .lock-icon-wrap {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      background: rgba(245, 158, 11, 0.12);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
      color: var(--warn)
    }

    .lock-text strong {
      display: block;
      font-size: 14px;
      font-weight: 700;
      color: var(--warn);
      margin-bottom: 3px
    }

    .lock-text p {
      font-size: 12px;
      color: var(--text-muted);
      line-height: 1.5
    }

    /* GEO WIDGET */
    .geo-widget {
      background: var(--bg-glass);
      border: 1.5px solid var(--border);
      border-radius: var(--radius-md);
      padding: 18px;
      backdrop-filter: blur(8px);
      transition: all var(--transition)
    }

    .geo-widget.safe {
      border-color: rgba(34, 197, 94, .35);
      background: rgba(34, 197, 94, .04)
    }

    .geo-widget.unsafe {
      border-color: rgba(239, 68, 68, .35);
      background: rgba(239, 68, 68, .04)
    }

    .geo-widget.loading {
      border-color: rgba(245, 158, 11, .35);
      background: rgba(245, 158, 11, .04)
    }

    .geo-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px
    }

    .geo-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--text-muted)
    }

    .geo-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--text-muted);
      transition: all .3s
    }

    .geo-dot.safe {
      background: var(--success);
      box-shadow: 0 0 8px rgba(34, 197, 94, .5)
    }

    .geo-dot.unsafe {
      background: var(--danger);
      box-shadow: 0 0 8px rgba(239, 68, 68, .5)
    }

    .geo-dot.loading {
      background: var(--warn);
      animation: livePulse 1s infinite
    }

    @keyframes livePulse {

      0%,
      100% {
        opacity: 1;
        transform: scale(1)
      }

      50% {
        opacity: .5;
        transform: scale(.8)
      }
    }

    .geo-main {
      display: flex;
      align-items: center;
      gap: 14px
    }

    .geo-icon {
      width: 52px;
      height: 52px;
      border-radius: var(--radius-sm);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      flex-shrink: 0;
      transition: all .3s
    }

    .geo-icon.safe {
      background: rgba(34, 197, 94, .12);
      color: var(--success)
    }

    .geo-icon.unsafe {
      background: rgba(239, 68, 68, .12);
      color: var(--danger)
    }

    .geo-icon.loading {
      background: rgba(245, 158, 11, .12);
      color: var(--warn)
    }

    .geo-title {
      font-family: var(--font-head);
      font-weight: 700;
      font-size: 15px;
      margin-bottom: 3px
    }

    .geo-distance {
      font-size: 12px;
      color: var(--text-muted)
    }

    .geo-distance strong {
      color: var(--text)
    }

    /* CAMERA */
    .camera-card {
      background: var(--bg-glass);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      overflow: hidden;
      backdrop-filter: blur(8px)
    }

    .camera-head {
      padding: 14px 18px 0;
      display: flex;
      align-items: center;
      justify-content: space-between
    }

    .camera-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--text-muted)
    }

    .camera-toggle {
      font-size: 11px;
      color: var(--primary);
      cursor: pointer;
      padding: 5px 12px;
      border-radius: 50px;
      border: 1px solid rgba(255, 183, 3, 0.3);
      background: rgba(255, 183, 3, 0.08);
      font-weight: 700;
      transition: all var(--transition)
    }

    .camera-toggle:hover {
      background: rgba(255, 183, 3, 0.16)
    }

    .camera-container {
      position: relative;
      width: 100%;
      padding-top: 75%;
      background: #000;
      margin-top: 14px;
      overflow: hidden
    }

    #videoEl {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      transform: scaleX(-1)
    }

    .camera-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 12px;
      background: rgba(0, 0, 0, 0.75)
    }

    .camera-overlay.hidden {
      display: none
    }

    .camera-overlay i {
      font-size: 40px;
      color: var(--text-muted)
    }

    .camera-overlay p {
      font-size: 12px;
      color: var(--text-muted);
      text-align: center;
      padding: 0 24px
    }

    .face-guide {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 140px;
      height: 165px;
      border: 2px dashed rgba(255, 183, 3, 0.5);
      border-radius: 50%;
      pointer-events: none;
      animation: guidePulse 2s ease-in-out infinite
    }

    @keyframes guidePulse {

      0%,
      100% {
        box-shadow: 0 0 0 0 rgba(255, 183, 3, .3)
      }

      50% {
        box-shadow: 0 0 0 10px rgba(255, 183, 3, 0)
      }
    }

    #capturedImg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: none
    }

    .camera-actions {
      padding: 14px 16px;
      display: flex;
      gap: 10px
    }

    .btn-capture {
      flex: 1;
      padding: 12px;
      background: rgba(255, 183, 3, 0.1);
      border: 1.5px solid rgba(255, 183, 3, 0.3);
      color: var(--primary);
      border-radius: var(--radius-md);
      font-family: var(--font-head);
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: all var(--transition);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px
    }

    .btn-capture:hover {
      background: rgba(255, 183, 3, 0.18)
    }

    .btn-capture:disabled {
      opacity: .4;
      cursor: not-allowed
    }

    .btn-retake {
      padding: 12px 16px;
      background: var(--bg-surface);
      border: 1px solid var(--border);
      color: var(--text-muted);
      border-radius: var(--radius-md);
      font-family: var(--font-head);
      font-size: 13px;
      cursor: pointer;
      display: none;
      transition: all var(--transition)
    }

    .btn-retake:hover {
      border-color: var(--primary);
      color: var(--primary)
    }

    /* CLOCK BTN */
    .btn-clock {
      width: 100%;
      padding: 20px;
      border: none;
      border-radius: var(--radius-lg);
      font-family: var(--font-head);
      font-weight: 900;
      font-size: 18px;
      letter-spacing: 1px;
      cursor: pointer;
      transition: all var(--transition);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px
    }

    .btn-clock.clock-in {
      background: linear-gradient(135deg, var(--success), #15803d);
      color: #fff;
      box-shadow: 0 6px 28px rgba(34, 197, 94, .3)
    }

    .btn-clock.clock-out {
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: #000;
      box-shadow: 0 6px 28px rgba(255, 183, 3, .3)
    }

    .btn-clock:not(:disabled):hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 36px rgba(34, 197, 94, .45)
    }

    .btn-clock.clock-out:not(:disabled):hover {
      box-shadow: 0 12px 36px rgba(255, 183, 3, .5)
    }

    .btn-clock:disabled {
      background: rgba(255, 255, 255, .06) !important;
      color: var(--text-muted) !important;
      cursor: not-allowed !important;
      box-shadow: none !important
    }

    /* TOAST */
    .toast-att {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%) translateY(-90px);
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 14px 20px;
      font-size: 13px;
      font-weight: 600;
      z-index: 999;
      transition: transform .3s ease;
      max-width: calc(100% - 32px);
      text-align: center;
      display: flex;
      align-items: center;
      gap: 8px
    }

    .toast-att.show {
      transform: translateX(-50%) translateY(0)
    }

    .toast-att.success {
      border-color: rgba(34, 197, 94, .4);
      color: var(--success)
    }

    .toast-att.error {
      border-color: rgba(239, 68, 68, .4);
      color: var(--danger)
    }

    .toast-att.warn {
      border-color: rgba(245, 158, 11, .4);
      color: var(--warn)
    }
  </style>
</head>

<body>

  <div class="header">
    <a href="employee.html" class="back-btn"><i class="bi bi-arrow-left"></i></a>
    <div class="header-info">
      <h2>Absensi</h2>
      <p id="headerSub">Memuat status...</p>
    </div>
  </div>

  <div class="toast-att" id="toastEl"></div>

  <div class="content">
    <!-- CLOCK -->
    <div class="clock-widget fade-in">
      <div class="clock-time" id="clockDisplay">--:--:--</div>
      <div class="clock-date" id="clockDate">—</div>
    </div>

    <!-- LOCK BANNER -->
    <div class="lock-banner" id="lockBanner">
      <div class="lock-icon-wrap"><i class="bi bi-lock-fill"></i></div>
      <div class="lock-text">
        <strong id="lockTitle">Absensi Dikunci</strong>
        <p id="lockReason">—</p>
      </div>
    </div>

    <!-- GEO -->
    <div class="geo-widget loading" id="geoWidget">
      <div class="geo-header">
        <span class="geo-label">Status Lokasi</span>
        <div class="geo-dot loading" id="geoDot"></div>
      </div>
      <div class="geo-main">
        <div class="geo-icon loading" id="geoIcon"><i class="bi bi-broadcast"></i></div>
        <div>
          <div class="geo-title" id="geoTitle">Mendeteksi lokasi...</div>
          <div class="geo-distance" id="geoDistance">Meminta izin GPS</div>
        </div>
      </div>
    </div>

    <!-- CAMERA -->
    <div class="camera-card fade-in">
      <div class="camera-head">
        <span class="camera-label"><i class="bi bi-camera-fill"></i> &nbsp;Foto Selfie</span>
        <span class="camera-toggle" id="cameraToggle" onclick="startCamera()">Aktifkan Kamera</span>
      </div>
      <div class="camera-container">
        <video id="videoEl" autoplay playsinline muted></video>
        <div class="camera-overlay" id="cameraOverlay">
          <i class="bi bi-camera"></i>
          <p>Aktifkan kamera untuk mengambil foto selfie sebelum absen</p>
        </div>
        <div class="face-guide" id="faceGuide" style="display:none"></div>
        <img id="capturedImg" alt="Foto selfie">
      </div>
      <div class="camera-actions">
        <button class="btn-capture" id="btnCapture" onclick="capturePhoto()" disabled>
          <i class="bi bi-camera-fill"></i> Ambil Foto
        </button>
        <button class="btn-retake" id="btnRetake" onclick="retakePhoto()"><i class="bi bi-arrow-repeat"></i></button>
      </div>
    </div>

    <!-- MAIN ACTION -->
    <button class="btn-clock clock-in" id="mainBtn" disabled onclick="submitAttendance()">
      <i class="bi bi-box-arrow-in-up"></i>
      <span id="mainBtnText">CLOCK IN</span>
    </button>
  </div>

  <canvas id="photoCanvas" style="display:none"></canvas>

  <script src="js/script.js"></script>

</body>

</html>
