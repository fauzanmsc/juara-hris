<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>JEF HRIS — Riwayat Kehadiran</title>
<meta name="theme-color" content="#FFB703">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800;900&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<style>
body{max-width:480px;margin:0 auto;background:var(--bg-deep)}
.header{background:rgba(26,26,26,0.95);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);padding:16px 18px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.header-left{display:flex;align-items:center;gap:12px}
.back-btn{width:38px;height:38px;border-radius:var(--radius-sm);background:var(--bg-card);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;color:var(--text-muted);font-size:20px;cursor:pointer;flex-shrink:0;transition:all var(--transition)}
.back-btn:hover{border-color:var(--primary);color:var(--primary)}
.header h1{font-family:var(--font-head);font-weight:800;font-size:17px}
.btn-logout{background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.2);color:var(--danger);padding:7px 14px;border-radius:50px;font-size:11px;font-weight:700;cursor:pointer;transition:all var(--transition);display:flex;align-items:center;gap:5px}
.btn-logout:hover{background:rgba(239,68,68,0.15)}

.content{padding:18px;padding-bottom:90px}

/* FILTER CHIPS */
.filter-chips{display:flex;gap:8px;margin-bottom:18px;overflow-x:auto;padding-bottom:4px}
.filter-chips::-webkit-scrollbar{display:none}
.filter-chip{background:var(--bg-card);border:1px solid var(--border);color:var(--text-muted);padding:7px 16px;border-radius:50px;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;transition:all var(--transition);flex-shrink:0}
.filter-chip:hover{border-color:rgba(255,183,3,0.3);color:var(--primary)}
.filter-chip.active{background:rgba(255,183,3,0.12);border-color:rgba(255,183,3,0.4);color:var(--primary)}

/* HISTORY ITEMS */
.section-label{font-size:10px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:rgba(255,183,3,0.5);margin-bottom:14px;margin-top:6px}
.history-list{display:flex;flex-direction:column;gap:10px}
.history-item{background:var(--bg-glass);border:1px solid var(--border);border-radius:var(--radius-lg);padding:18px;backdrop-filter:blur(8px);transition:all var(--transition);animation:fadeIn .3s ease}
.history-item:hover{border-color:var(--border-hover);transform:translateY(-2px)}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.history-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px}
.history-date{font-family:var(--font-head);font-weight:800;font-size:15px}
.history-sub{font-size:11px;color:var(--text-muted);margin-top:2px}
.history-times{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.time-block{background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px}
.time-lbl{font-size:10px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px}
.time-val{font-family:var(--font-head);font-weight:800;font-size:20px;color:var(--text)}
.time-val.empty{font-size:16px;color:rgba(255,255,255,0.2)}
.history-notes{font-size:12px;color:var(--text-muted);padding-top:12px;border-top:1px solid var(--border);margin-top:12px;display:flex;align-items:center;gap:6px}

/* STATUS BADGE */
.status-badge{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:50px;font-size:10px;font-weight:700;text-transform:uppercase}
.s-ok{background:rgba(34,197,94,.15);color:var(--success);border:1px solid rgba(34,197,94,.3)}
.s-late{background:rgba(245,158,11,.15);color:var(--warn);border:1px solid rgba(245,158,11,.3)}
.s-empty{background:rgba(138,138,154,.12);color:var(--text-muted);border:1px solid rgba(138,138,154,.2)}

/* EMPTY + LOADING */
.empty-state{text-align:center;padding:60px 20px;color:var(--text-muted)}
.empty-state i{font-size:52px;opacity:.35;display:block;margin-bottom:14px}
.empty-state h4{font-size:15px;font-weight:700;color:var(--text);margin-bottom:6px}
.loading-state{text-align:center;padding:50px 20px;color:var(--text-muted)}
.spinner-lg{width:36px;height:36px;border:3px solid rgba(255,183,3,0.15);border-top-color:var(--primary);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 14px}
@keyframes spin{to{transform:rotate(360deg)}}

/* BOTTOM NAV */
.bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:rgba(26,26,26,0.97);backdrop-filter:blur(20px);border-top:1px solid var(--border);display:flex;padding:10px 0 calc(10px + env(safe-area-inset-bottom));z-index:100}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;padding:6px 4px;color:var(--text-muted);font-size:10px;font-weight:700;letter-spacing:.3px;text-decoration:none;position:relative;transition:all var(--transition)}
.nav-item.active{color:var(--primary)}
.nav-item.active::before{content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);width:30px;height:3px;background:linear-gradient(90deg,var(--primary),var(--primary-dark));border-radius:0 0 4px 4px}
.nav-item i{font-size:23px;transition:transform var(--transition)}
.nav-item.active i{transform:scale(1.15)}
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <button class="back-btn" onclick="goBack()"><i class="bi bi-arrow-left"></i></button>
    <h1>Riwayat Kehadiran</h1>
  </div>
  <button class="btn-logout" onclick="logout()"><i class="bi bi-box-arrow-right"></i> Keluar</button>
</div>

<div class="content">
  <div class="filter-chips">
    <div class="filter-chip active" onclick="filterHistory('all', this)">Semua</div>
    <div class="filter-chip" onclick="filterHistory('on-time', this)">Tepat Waktu</div>
    <div class="filter-chip" onclick="filterHistory('late', this)">Terlambat</div>
  </div>

  <div class="section-label">Riwayat Kehadiran</div>
  <div class="history-list" id="historyList">
    <div class="loading-state">
      <div class="spinner-lg"></div>
      <p>Memuat riwayat kehadiran...</p>
    </div>
  </div>
</div>

<nav class="bottom-nav">
  <a href="employee.html" class="nav-item">
    <i class="bi bi-house-fill"></i>Beranda
  </a>
  <a href="attendance.html" class="nav-item">
    <i class="bi bi-geo-alt-fill"></i>Absensi
  </a>
  <a href="leave.html" class="nav-item">
    <i class="bi bi-calendar-check"></i>Pengajuan
  </a>
  <a href="history.html" class="nav-item active">
    <i class="bi bi-clock-history"></i>Riwayat
  </a>
</nav>

<script>
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzYHL6Fb1PelIa-yfWjD0u5jXQ0opu-OfBxTcyw4SQXaE60-rJLkU_lnc3RVW1xlETkDg/exec';
const userData = JSON.parse(sessionStorage.getItem('hris_user') || 'null');
if (!userData || userData.role !== 'Employee') window.location.href = 'index.html';

let allHistory = [], currentFilter = 'all';

async function loadHistory() {
  try {
    const res = await fetch(APPS_SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: 'getAttendance', user_id: userData.user_id }) });
    const data = await res.json();
    allHistory = data.success && data.records ? data.records : getDemoData();
    renderHistory();
  } catch(e) {
    allHistory = getDemoData();
    renderHistory();
  }
}

function getDemoData() {
  return [
    {date:'2026-05-15',clock_in_time:'09:58:00',clock_out_time:'19:02:00',status_in:'Tepat Waktu'},
    {date:'2026-05-14',clock_in_time:'10:18:00',clock_out_time:'19:05:00',status_in:'Terlambat'},
    {date:'2026-05-13',clock_in_time:'09:55:00',clock_out_time:'18:58:00',status_in:'Tepat Waktu'},
    {date:'2026-05-12',clock_in_time:'10:01:00',clock_out_time:'',status_in:'Tepat Waktu'},
  ];
}

function filterByStatus(records, status) {
  if (status==='all') return records;
  if (status==='on-time') return records.filter(r=>r.status_in!=='Terlambat'&&r.status_in);
  if (status==='late') return records.filter(r=>r.status_in==='Terlambat');
  return records;
}

function filterHistory(status, el) {
  currentFilter = status;
  document.querySelectorAll('.filter-chip').forEach(c=>c.classList.remove('active'));
  el.classList.add('active');
  renderHistory();
}

function formatDate(dateStr) {
  const DAYS=['Minggu','Senin','Selasa','Rabu','Kamis','Jumat','Sabtu'];
  const MONTHS=['Jan','Feb','Mar','Apr','Mei','Jun','Jul','Agu','Sep','Okt','Nov','Des'];
  const [y,m,d]=dateStr.split('-');
  const dt=new Date(y,m-1,d);
  return {day:DAYS[dt.getDay()],date:`${d} ${MONTHS[m-1]} ${y}`};
}

function renderHistory() {
  const filtered = filterByStatus(allHistory, currentFilter);
  const container = document.getElementById('historyList');
  if (!filtered.length) {
    container.innerHTML=`<div class="empty-state"><i class="bi bi-calendar-x"></i><h4>Tidak ada data</h4><p>Tidak ada riwayat kehadiran ditemukan</p></div>`;
    return;
  }
  container.innerHTML = filtered.map(r => {
    const {day,date}=formatDate(r.date);
    const hasOut=!!r.clock_out_time;
    const statusCls=r.status_in==='Terlambat'?'s-late':r.status_in?'s-ok':'s-empty';
    const statusTxt=r.status_in||'Belum Absen';
    const inTime=r.clock_in_time?r.clock_in_time.substring(0,5):'--:--';
    const outTime=hasOut?r.clock_out_time.substring(0,5):'--:--';
    return `
      <div class="history-item">
        <div class="history-header">
          <div>
            <div class="history-date">${day}, ${date}</div>
          </div>
          <span class="status-badge ${statusCls}">${statusTxt}</span>
        </div>
        <div class="history-times">
          <div class="time-block">
            <div class="time-lbl">Masuk</div>
            <div class="time-val ${r.clock_in_time?'':'empty'}">${inTime}</div>
          </div>
          <div class="time-block">
            <div class="time-lbl">Pulang</div>
            <div class="time-val ${hasOut?'':'empty'}">${outTime}</div>
          </div>
        </div>
        ${r.notes?`<div class="history-notes"><i class="bi bi-chat-left-text"></i>${r.notes}</div>`:''}
      </div>`;
  }).join('');
}

function goBack() { window.location.href = 'employee.html'; }
function logout() {
  if (confirm('Yakin ingin keluar?')) { sessionStorage.removeItem('hris_user'); window.location.href='index.html'; }
}

loadHistory();
</script>
</body>
</html>
