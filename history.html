<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>JEF e-Attendance — Riwayat Kehadiran</title>
  <meta name="theme-color" content="#FFB703">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800;900&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap"
    rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <style>
    body {
      max-width: 480px;
      margin: 0 auto;
      background: var(--bg-deep)
    }

    .header {
      background: var(--bg-surface);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
      padding: 16px 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 50
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 12px
    }

    .back-btn {
      width: 38px;
      height: 38px;
      border-radius: var(--radius-sm);
      background: var(--bg-card);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-muted);
      font-size: 20px;
      cursor: pointer;
      flex-shrink: 0;
      transition: all var(--transition)
    }

    .back-btn:hover {
      border-color: var(--primary);
      color: var(--primary)
    }

    .header h1 {
      font-family: var(--font-head);
      font-weight: 800;
      font-size: 17px
    }

    .btn-logout {
      background: rgba(239, 68, 68, 0.08);
      border: 1px solid rgba(239, 68, 68, 0.2);
      color: var(--danger);
      padding: 7px 14px;
      border-radius: 50px;
      font-size: 11px;
      font-weight: 700;
      cursor: pointer;
      transition: all var(--transition);
      display: flex;
      align-items: center;
      gap: 5px
    }

    .btn-logout:hover {
      background: rgba(239, 68, 68, 0.15)
    }

    .content {
      padding: 18px;
      padding-bottom: 90px
    }

    /* FILTER CHIPS */
    .filter-chips {
      display: flex;
      gap: 8px;
      margin-bottom: 18px;
      overflow-x: auto;
      padding-bottom: 4px
    }

    .filter-chips::-webkit-scrollbar {
      display: none
    }

    .filter-chip {
      background: var(--bg-card);
      border: 1px solid var(--border);
      color: var(--text-muted);
      padding: 9px 20px;
      border-radius: 50px;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
      transition: all var(--transition);
      flex-shrink: 0;
      box-shadow: var(--shadow-neu-soft);
    }

    .filter-chip:hover {
      border-color: var(--border-hover);
      color: var(--primary);
      transform: translateY(-1px);
    }

    .filter-chip.active {
      background: var(--primary-glow);
      border-color: var(--primary);
      color: var(--primary);
      box-shadow: var(--shadow-neu-inset);
    }

    /* HISTORY ITEMS */
    .section-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      color: rgba(255, 183, 3, 0.5);
      margin-bottom: 14px;
      margin-top: 6px
    }

    .history-list {
      display: flex;
      flex-direction: column;
      gap: 10px
    }

    .history-item {
      background: var(--bg-glass);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 18px;
      backdrop-filter: blur(8px);
      box-shadow: var(--shadow-neu-flat);
      transition: all var(--transition);
      animation: fadeIn .3s ease
    }

    .history-item:hover {
      border-color: var(--border-hover);
      transform: translateY(-4px);
      background: linear-gradient(135deg, rgba(255, 183, 3, 0.05) 0%, rgba(251, 133, 0, 0.08) 100%);
      box-shadow: var(--shadow-glow);
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(10px)
      }

      to {
        opacity: 1;
        transform: translateY(0)
      }
    }

    .history-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 14px
    }

    .history-date {
      font-family: var(--font-head);
      font-weight: 800;
      font-size: 15px
    }

    .history-sub {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 2px
    }

    .history-times {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px
    }

    .time-block {
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 12px;
      transition: all var(--transition);
    }

    .time-block.block-in {
      background: rgba(34, 197, 94, 0.04);
      border: 1px solid rgba(34, 197, 94, 0.25);
      box-shadow: var(--shadow-neu-flat);
    }
    .time-block.block-in .time-lbl {
      color: var(--success);
      font-weight: 700;
    }
    .time-block.block-in .time-val {
      color: var(--success);
    }

    .time-block.block-out {
      background: rgba(239, 68, 68, 0.04);
      border: 1px solid rgba(239, 68, 68, 0.25);
      box-shadow: var(--shadow-neu-flat);
    }
    .time-block.block-out .time-lbl {
      color: var(--danger);
      font-weight: 700;
    }
    .time-block.block-out .time-val {
      color: var(--danger);
    }

    .time-lbl {
      font-size: 10px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: .5px;
      margin-bottom: 5px
    }

    .time-val {
      font-family: var(--font-head);
      font-weight: 800;
      font-size: 20px;
      color: var(--text)
    }

    .time-val.empty {
      font-size: 16px;
      color: rgba(255, 255, 255, 0.2)
    }

    .history-notes {
      font-size: 12px;
      color: var(--text-muted);
      padding-top: 12px;
      border-top: 1px solid var(--border);
      margin-top: 12px;
      display: flex;
      align-items: center;
      gap: 6px
    }

    /* STATUS BADGE */
    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 4px 10px;
      border-radius: 50px;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase
    }

    .s-ok {
      background: rgba(34, 197, 94, .15);
      color: var(--success);
      border: 1px solid rgba(34, 197, 94, .3)
    }

    .s-late {
      background: rgba(239, 68, 68, .15);
      color: var(--danger);
      border: 1px solid rgba(239, 68, 68, .3)
    }

    .s-empty {
      background: rgba(138, 138, 154, .12);
      color: var(--text-muted);
      border: 1px solid rgba(138, 138, 154, .2)
    }

    /* EMPTY + LOADING */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted)
    }

    .empty-state i {
      font-size: 52px;
      opacity: .35;
      display: block;
      margin-bottom: 14px
    }

    .empty-state h4 {
      font-size: 15px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 6px
    }

    .loading-state {
      text-align: center;
      padding: 50px 20px;
      color: var(--text-muted)
    }

    .spinner-lg {
      width: 36px;
      height: 36px;
      border: 3px solid rgba(255, 183, 3, 0.15);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin .8s linear infinite;
      margin: 0 auto 14px
    }

    @keyframes spin {
      to {
        transform: rotate(360deg)
      }
    }

    /* Inheriting global neumorphic bottom-nav from style.css */
  </style>
</head>

<body>

  <div class="header">
    <div class="header-left">
      <button class="back-btn" onclick="goBack()"><i class="bi bi-arrow-left"></i></button>
      <h1>Riwayat Kehadiran</h1>
    </div>
    <div style="display:flex; align-items:center; gap:8px;">
      <button class="theme-toggle-btn" id="themeToggleBtn" onclick="toggleTheme()" title="Ganti Mode" style="background:rgba(255,255,255,0.08); border:1px solid var(--border); border-radius:50%; width:36px; height:36px; display:flex; align-items:center; justify-content:center; color:var(--text); font-size:16px; transition: all var(--transition); cursor:pointer;">
        <i class="bi bi-sun-fill"></i>
      </button>
      <button class="btn-logout" onclick="logout()"><i class="bi bi-box-arrow-right"></i> Keluar</button>
    </div>
  </div>

  <div class="content">
    <div class="filter-chips">
      <div class="filter-chip active" onclick="filterHistory('all', this)">Semua</div>
      <div class="filter-chip" onclick="filterHistory('on-time', this)">Tepat Waktu</div>
      <div class="filter-chip" onclick="filterHistory('late', this)">Terlambat</div>
    </div>

    <div class="section-label">Riwayat Kehadiran</div>
    <div class="history-list" id="historyList">
      <div class="loading-state">
        <div class="spinner-lg"></div>
        <p>Memuat riwayat kehadiran...</p>
      </div>
    </div>
  </div>

  <nav class="bottom-nav">
    <a href="employee.html" class="nav-item">
      <i class="bi bi-house-fill"></i>Beranda
    </a>
    <a href="attendance.html" class="nav-item">
      <i class="bi bi-geo-alt-fill"></i>Absensi
    </a>
    <a href="leave.html" class="nav-item">
      <i class="bi bi-calendar-check"></i>Pengajuan
    </a>
    <a href="history.html" class="nav-item active">
      <i class="bi bi-clock-history"></i>Riwayat
    </a>
  </nav>

  <script src="js/script.js"></script>
</body>

</html>
