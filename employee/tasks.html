<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>JEF Productivity — Tugas Daily</title>
  <meta name="theme-color" content="#FFB703">
  <link rel="icon" type="image/png" href="../img/logomark.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800;900&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap"
    rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
  <link rel="manifest" href="/json/manifest.json">
  <style>
    /* Premium iOS-style Toggle Switch */
    .toggle-switch-wrapper {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-top: 6px;
      background: rgba(255, 255, 255, 0.04);
      padding: 8px 16px;
      border-radius: 12px;
      border: 1px solid var(--border);
      width: fit-content;
    }

    .toggle-label {
      font-size: 12px;
      font-weight: 700;
      transition: all var(--transition);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-muted);
    }

    .toggle-label.active {
      color: var(--primary) !important;
      text-shadow: 0 0 8px rgba(255, 183, 3, 0.4);
    }

    .switch {
      position: relative;
      display: inline-block;
      width: 48px;
      height: 24px;
    }

    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: rgba(255, 255, 255, 0.1);
      border: 1px solid var(--border);
      transition: .4s;
    }

    .slider:before {
      position: absolute;
      content: "";
      height: 16px;
      width: 16px;
      left: 3px;
      bottom: 3px;
      background-color: white;
      transition: .4s;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.3);
    }

    input:checked+.slider {
      background-color: var(--success);
      border-color: rgba(34, 197, 94, 0.4);
    }

    input:checked+.slider:before {
      transform: translateX(24px);
    }

    .slider.round {
      border-radius: 34px;
    }

    .slider.round:before {
      border-radius: 50%;
    }

    /* Eye Catching Stats Progress */
    .progress-bar-wrapper {
      width: 100%;
      height: 10px;
      background: rgba(255, 255, 255, 0.08);
      border-radius: 10px;
      overflow: hidden;
      position: relative;
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    .progress-bar {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, var(--primary), var(--success));
      border-radius: 10px;
      transition: width 0.6s cubic-bezier(0.16, 1, 0.3, 1);
    }

    /* Modern 24h input */
    input[type="time"] {
      font-weight: 700 !important;
      color-scheme: light dark;
    }

    [data-theme="light"] input[type="time"] {
      color-scheme: light;
      color: #1a1a2e;
    }

    [data-theme="light"] input[type="time"]::-webkit-calendar-picker-indicator {
      filter: invert(0.15);
      opacity: 0.85;
      cursor: pointer;
    }

    input[type="time"]::-webkit-calendar-picker-indicator {
      cursor: pointer;
      opacity: 0.7;
    }

    /* In-app Document Preview Modal */
    #previewIframe {
      width: 100%;
      height: 500px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: #000;
    }

    /* Minimal Card Grid */
    .task-minimal-card {
      background: var(--bg-glass, rgba(255, 255, 255, 0.05));
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      transition: all var(--transition);
      position: relative;
      overflow: hidden;
    }

    .task-minimal-card:hover {
      border-color: var(--border-hover);
      transform: translateY(-2px);
      box-shadow: var(--shadow-glow);
    }

    /* Hide category from UI but keep compatibility */
    .hidden-compatibility {
      display: none !important;
    }
  </style>
</head>

<body class="leave-page">
  <div class="wrap-employee">
    <div class="header">
      <div style="display:flex; align-items:center; gap:14px;">
        <a href="/employee/beranda.html" class="back-btn"><i class="bi bi-arrow-left"></i></a>
        <div class="header-info">
          <h2>Tugas Daily</h2>
          <p>Productivity Monitoring</p>
        </div>
      </div>
      <div style="display:flex; align-items:center; gap:8px;">
        <button class="theme-toggle-btn" id="themeToggleBtn" onclick="toggleTheme()" title="Ganti Mode"
          style="background:rgba(255,255,255,0.08); border:1px solid var(--border); border-radius:50%; width:36px; height:36px; display:flex; align-items:center; justify-content:center; color:var(--text); font-size:16px; transition: all var(--transition); cursor:pointer;">
          <i class="bi bi-sun-fill"></i>
        </button>
        <button class="btn-logout" onclick="logout()"><i class="bi bi-box-arrow-right"></i> Keluar</button>
      </div>
    </div>

    <div class="tabs">
      <div class="tab-item active" id="tab-form" onclick="switchTab('form')">Lapor Tugas</div>
      <div class="tab-item" id="tab-history" onclick="switchTab('history')">Daftar Tugas</div>
    </div>

    <div class="toast-lv" id="toastEl"
      style="display:none; position:fixed; top:20px; right:20px; z-index:9999; background:var(--primary); color:#000; padding:12px 24px; border-radius:50px; font-weight:700; box-shadow:var(--shadow-lg);">
    </div>

    <div class="content" style="padding: 20px; overflow-y: auto; height: calc(100vh - 190px);">
      <!-- TAB FORM -->
      <div id="section-form">
        <div class="card"
          style="background:var(--card-bg, rgba(255,255,255,0.05)); backdrop-filter:blur(16px); -webkit-backdrop-filter:blur(16px); border:1px solid var(--border); border-radius:var(--radius-lg); padding:20px;">
          <form id="taskForm" onsubmit="submitTask(event)">
            <div class="form-group" style="margin-bottom:16px;">
              <label class="form-label">Nama / Judul Tugas*</label>
              <input type="text" id="taskName" required class="form-control"
                placeholder="Contoh: Menyusun Laporan Keuangan Mingguan" style="width:100%; box-sizing:border-box;">
            </div>

            <div class="form-group" style="margin-bottom:16px;">
              <label class="form-label">Target / Goals*</label>
              <input type="text" id="taskTarget" required class="form-control"
                placeholder="Contoh: Menyelesaikan 100% input jurnal transaksi"
                style="width:100%; box-sizing:border-box;">
            </div>

            <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:16px;">
              <div class="form-group" style="margin-bottom:0;">
                <label class="form-label">Mulai Jam*</label>
                <input type="time" id="taskStartTime" required class="form-control"
                  style="width:100%; box-sizing:border-box;">
              </div>
              <div class="form-group" style="margin-bottom:0;">
                <label class="form-label">Selesai Jam*</label>
                <input type="time" id="taskEndTime" required class="form-control"
                  style="width:100%; box-sizing:border-box;">
              </div>
            </div>

            <div class="form-group" style="margin-bottom:16px;">
              <label class="form-label">Output Yang Dihasilkan*</label>
              <input type="text" id="taskOutput" required class="form-control"
                placeholder="Contoh: File Excel Laporan Keuangan.xlsx" style="width:100%; box-sizing:border-box;">
            </div>

            <div class="form-group" style="margin-bottom:16px;">
              <label class="form-label">Status Tugas*</label>
              <div class="toggle-switch-wrapper">
                <span class="toggle-label active" id="form-status-label-left">Belum</span>
                <label class="switch">
                  <input type="checkbox" id="taskStatusToggle"
                    onchange="updateToggleLabel(this, 'form-status-label-left', 'form-status-label-right')">
                  <span class="slider round"></span>
                </label>
                <span class="toggle-label" id="form-status-label-right">Selesai</span>
              </div>
            </div>

            <div class="form-group hidden-compatibility" style="margin-bottom:16px;">
              <select id="taskCategory" class="form-control">
                <option value="Other" selected>Other</option>
              </select>
            </div>

            <div class="form-group" style="margin-bottom:16px;">
              <label class="form-label">Catatan / Issue (Opsional)</label>
              <textarea id="taskNotes" class="form-control" rows="2"
                placeholder="Catatan issue, hambatan atau kendala pekerjaan jika ada..."
                style="width:100%; box-sizing:border-box; resize:none; font-family:inherit;"></textarea>
            </div>

            <div class="form-group" style="margin-bottom:16px;">
              <label class="form-label">Lainnya (Opsional)</label>
              <textarea id="taskOthers" class="form-control" rows="2" placeholder="Informasi tambahan lainnya..."
                style="width:100%; box-sizing:border-box; resize:none; font-family:inherit;"></textarea>
            </div>

            <div class="form-group" style="margin-bottom:20px;">
              <label class="form-label">Dokumen / Gambar Pendukung (Opsional)</label>
              <input type="file" id="taskFile" class="form-control"
                style="width:100%; box-sizing:border-box; padding:6px 12px;"
                accept="image/*,application/pdf,application/msword,application/vnd.openxmlformats-officedocument.wordprocessingml.document,application/vnd.ms-excel,application/vnd.openxmlformats-officedocument.spreadsheetml.sheet">
              <span style="font-size:11px; color:var(--text-muted); display:block; margin-top:4px;">Format yang
                didukung: Gambar, PDF, Word, Excel.</span>
            </div>

            <button type="submit" class="btn btn-primary" style="width:100%; justify-content:center; gap:8px;">
              <i class="bi bi-send-fill"></i> Kirim Laporan Tugas
            </button>
          </form>
        </div>
      </div>

      <!-- TAB HISTORY -->
      <div id="section-history" style="display:none;">
        <!-- Insight Card -->
        <div class="stat-card fade-in"
          style="margin-bottom: 20px; background: linear-gradient(135deg, rgba(255, 183, 3, 0.1), rgba(255, 146, 0, 0.05)); border: 1px solid rgba(255, 183, 3, 0.25);">
          <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;">
            <div>
              <div
                style="font-size:11px; color:var(--text-muted); font-weight:700; text-transform:uppercase; letter-spacing:0.8px;">
                Insight Hari Ini</div>
              <h3 style="font-size:18px; font-weight:800; color:var(--text); margin:4px 0 0 0;" id="insightText">0 / 0
                Tugas Selesai</h3>
            </div>
            <div class="stat-icon stat-icon-primary"
              style="width: 40px; height: 40px; border-radius: 12px; background: rgba(255, 183, 3, 0.15); color: var(--primary);">
              <i class="bi bi-pie-chart-fill" style="font-size:18px;"></i>
            </div>
          </div>
          <div class="progress-bar-wrapper">
            <div class="progress-bar" id="insightProgress"></div>
          </div>
          <div
            style="display:flex; justify-content:space-between; align-items:center; margin-top:8px; font-size:11px; color:var(--text-muted);">
            <span id="insightPercent" style="font-weight:700; color:var(--text)">0% Selesai</span>
            <span id="insightMotivation">Tetap produktif! 💪</span>
          </div>
        </div>

        <!-- Compact Date Navigator -->
        <div class="card"
          style="background:var(--card-bg, rgba(255,255,255,0.03)); border:1px solid var(--border); border-radius:var(--radius-md); padding:16px; margin-bottom:16px; display:flex; flex-direction:column; gap:12px;">
          <div style="display:flex; align-items:center; justify-content:space-between; gap:10px;">
            <button class="btn btn-sm btn-ghost" onclick="shiftActiveDate(-1)"
              style="border-radius:50%; width:36px; height:36px; padding:0; display:flex; align-items:center; justify-content:center; flex-shrink:0;">
              <i class="bi bi-chevron-left" style="font-size:16px;"></i>
            </button>
            <div style="text-align:center; flex:1;">
              <div
                style="font-size:10px; color:var(--text-muted); text-transform:uppercase; font-weight:700; letter-spacing:0.8px;">
                Tanggal Tugas</div>
              <div style="font-size:15px; font-weight:800; color:var(--text); margin-top:2px;" id="activeDateDisplay">-
              </div>
            </div>
            <button class="btn btn-sm btn-ghost" onclick="shiftActiveDate(1)"
              style="border-radius:50%; width:36px; height:36px; padding:0; display:flex; align-items:center; justify-content:center; flex-shrink:0;">
              <i class="bi bi-chevron-right" style="font-size:16px;"></i>
            </button>
          </div>
          <div style="display:grid; grid-template-columns: 2fr 1fr; gap:10px; align-items:center;">
            <input type="date" id="activeDateInput" class="form-control"
              style="font-size:13px; font-weight:700; padding:8px 12px; height:38px; border-radius:12px;"
              onchange="handleDateInputChange(this)">
            <button onclick="loadMyTasks()" class="btn btn-primary btn-sm"
              style="height:38px; border-radius:12px; display:flex; align-items:center; justify-content:center; font-weight:700; gap:6px;">
              <i class="bi bi-arrow-clockwise" style="font-size:14px;"></i> Load
            </button>
          </div>
        </div>

        <!-- Dynamic Status Filter Button Group -->
        <div style="display:flex; gap:8px; margin-bottom:18px;">
          <button class="btn btn-sm btn-primary filter-status-btn" onclick="filterByStatus('all')"
            id="filter-status-all" style="flex:1; border-radius:12px; font-weight:700;">Semua</button>
          <button class="btn btn-sm btn-ghost filter-status-btn" onclick="filterByStatus('Pending')"
            id="filter-status-Pending" style="flex:1; border-radius:12px; font-weight:700;">Belum</button>
          <button class="btn btn-sm btn-ghost filter-status-btn" onclick="filterByStatus('Completed')"
            id="filter-status-Completed" style="flex:1; border-radius:12px; font-weight:700;">Selesai</button>
        </div>

        <!-- Task List Container -->
        <div id="taskListContainer" style="display:flex; flex-direction:column; gap:12px;">
          <!-- Loaded dynamically -->
        </div>
      </div>
    </div>

    <!-- BOTTOM NAV -->
  </div>

  <!-- ============ MODALS SECTION ============ -->

  <!-- Modal Preview Lampiran -->
  <div class="overlay hidden" id="modalPreview">
    <div class="modal border-animated-modal modal-lg" style="max-width: 600px; width: 95%;">
      <div class="card-border-glow"></div>
      <div class="modal-header" style="position:relative; z-index:2;">
        <h3 class="modal-title"><i class="bi bi-file-earmark-text-fill text-primary" style="margin-right:8px"></i>
          Preview Lampiran</h3>
        <button class="modal-close" onclick="closeModal('modalPreview')"><i class="bi bi-x"></i></button>
      </div>
      <div class="modal-body" id="previewBody"
        style="position:relative; z-index:2; padding:0; display:flex; align-items:center; justify-content:center; background:rgba(0,0,0,0.15); border-radius:12px; min-height:350px;">
        <!-- Embedded Content -->
      </div>
    </div>
  </div>

  <!-- Modal Detail Tugas -->
  <div class="overlay hidden" id="modalViewTask">
    <div class="modal border-animated-modal" style="max-width: 500px; width: 95%;">
      <div class="card-border-glow"></div>
      <div class="modal-header" style="position:relative; z-index:2;">
        <h3 class="modal-title"><i class="bi bi-info-circle-fill text-primary" style="margin-right:8px"></i> Detail
          Tugas</h3>
        <button class="modal-close" onclick="closeModal('modalViewTask')"><i class="bi bi-x"></i></button>
      </div>
      <div class="modal-body" id="viewTaskBody"
        style="position:relative; z-index:2; display:flex; flex-direction:column; gap:14px;">
        <!-- Filled Dynamically -->
      </div>
      <div class="modal-footer" style="position:relative; z-index:2;">
        <button class="btn btn-primary" onclick="closeModal('modalViewTask')"
          style="width:100%; border-radius:50px; font-weight:700;">Tutup</button>
      </div>
    </div>
  </div>

  <!-- Modal Edit Tugas -->
  <div class="overlay hidden" id="modalEditTask">
    <div class="modal border-animated-modal" style="max-width: 500px; width: 95%;">
      <div class="card-border-glow"></div>
      <div class="modal-header" style="position:relative; z-index:2;">
        <h3 class="modal-title"><i class="bi bi-pencil-square text-primary" style="margin-right:8px"></i> Edit Tugas
        </h3>
        <button class="modal-close" onclick="closeModal('modalEditTask')"><i class="bi bi-x"></i></button>
      </div>
      <form id="editTaskForm" onsubmit="submitEditTask(event)" style="display:contents;">
        <input type="hidden" id="editTaskId">

        <div class="modal-body" style="position:relative; z-index:2;">
          <div class="form-group">
            <label class="form-label">Nama / Judul Tugas*</label>
            <input type="text" id="editTaskName" required class="form-control" placeholder="Nama tugas...">
          </div>

          <div class="form-group">
            <label class="form-label">Target / Goals*</label>
            <input type="text" id="editTaskTarget" required class="form-control" placeholder="Target pencapaian...">
          </div>

          <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:18px;">
            <div class="form-group" style="margin-bottom:0;">
              <label class="form-label">Mulai Jam*</label>
              <input type="time" id="editTaskStartTime" required class="form-control">
            </div>
            <div class="form-group" style="margin-bottom:0;">
              <label class="form-label">Selesai Jam*</label>
              <input type="time" id="editTaskEndTime" required class="form-control">
            </div>
          </div>

          <div class="form-group">
            <label class="form-label">Output Yang Dihasilkan*</label>
            <input type="text" id="editTaskOutput" required class="form-control"
              placeholder="Output yang dihasilkan...">
          </div>

          <div class="form-group">
            <label class="form-label">Status Tugas*</label>
            <div class="toggle-switch-wrapper">
              <span class="toggle-label" id="edit-status-label-left">Belum</span>
              <label class="switch">
                <input type="checkbox" id="editTaskStatusToggle"
                  onchange="updateToggleLabel(this, 'edit-status-label-left', 'edit-status-label-right')">
                <span class="slider round"></span>
              </label>
              <span class="toggle-label" id="edit-status-label-right">Selesai</span>
            </div>
          </div>

          <div class="form-group">
            <label class="form-label">Catatan / Issue (Opsional)</label>
            <textarea id="editTaskNotes" class="form-control" rows="2"
              placeholder="Catatan issue jika ada..."></textarea>
          </div>

          <div class="form-group">
            <label class="form-label">Lainnya (Opsional)</label>
            <textarea id="editTaskOthers" class="form-control" rows="2" placeholder="Info lainnya..."></textarea>
          </div>

          <div class="form-group">
            <label class="form-label">Ganti Lampiran (Opsional)</label>
            <input type="file" id="editTaskFile" class="form-control"
              accept="image/*,application/pdf,application/msword,application/vnd.openxmlformats-officedocument.wordprocessingml.document,application/vnd.ms-excel,application/vnd.openxmlformats-officedocument.spreadsheetml.sheet">
          </div>
        </div>

        <div class="modal-footer" style="position:relative; z-index:2;">
          <button type="button" class="btn btn-ghost" onclick="closeModal('modalEditTask')">Batal</button>
          <button type="submit" class="btn btn-primary" id="editSubmitBtn">Simpan</button>
        </div>
      </form>
    </div>
  </div>

  <script src="/js/script.js"></script>
  <script>
    // Ensure active user is logged in
    const currentUser = JSON.parse(sessionStorage.getItem('hris_user')) || JSON.parse(localStorage.getItem('hris_user'));
    if (!currentUser || currentUser.role !== 'Employee') {
      window.location.href = window.getRedirectUrl('index');
    }

    // Active States
    let activeDate = new Date();
    let selectedStatusFilter = 'all';
    let currentTasksList = []; // Holds current loaded tasks

    // Setup defaults
    document.getElementById('activeDateInput').value = activeDate.toISOString().substring(0, 10);
    updateActiveDateDisplay();

    // Switch Tabs Helper
    function switchTab(tab) {
      document.querySelectorAll('.tab-item').forEach(el => el.classList.remove('active'));
      document.getElementById('tab-' + tab).classList.add('active');

      if (tab === 'form') {
        document.getElementById('section-form').style.display = 'block';
        document.getElementById('section-history').style.display = 'none';
      } else {
        document.getElementById('section-form').style.display = 'none';
        document.getElementById('section-history').style.display = 'block';
        loadMyTasks();
      }
    }

    // Toggle Labels Active State Helper
    function updateToggleLabel(checkbox, leftId, rightId) {
      const left = document.getElementById(leftId);
      const right = document.getElementById(rightId);
      if (checkbox.checked) {
        right.classList.add('active');
        left.classList.remove('active');
      } else {
        left.classList.add('active');
        right.classList.remove('active');
      }
    }

    // Initialize toggle labels state
    updateToggleLabel(document.getElementById('taskStatusToggle'), 'form-status-label-left', 'form-status-label-right');

    // Indonesian Day/Date Formatting Helper
    function formatIndonesianDate(dateObj) {
      const days = ['Minggu', 'Senin', 'Selasa', 'Rabu', 'Kamis', 'Jumat', 'Sabtu'];
      const months = ['Januari', 'Februari', 'Maret', 'April', 'Mei', 'Juni', 'Juli', 'Agustus', 'September', 'Oktober', 'November', 'Desember'];

      const dayName = days[dateObj.getDay()];
      const dateNum = dateObj.getDate();
      const monthName = months[dateObj.getMonth()];
      const yearNum = dateObj.getFullYear();

      return `${dayName}, ${dateNum} ${monthName} ${yearNum}`;
    }

    function updateActiveDateDisplay() {
      document.getElementById('activeDateDisplay').textContent = formatIndonesianDate(activeDate);
      document.getElementById('activeDateInput').value = activeDate.toISOString().substring(0, 10);
    }

    // Explicit date shifting
    function shiftActiveDate(days) {
      activeDate.setDate(activeDate.getDate() + days);
      updateActiveDateDisplay();
      loadMyTasks();
    }

    function handleDateInputChange(el) {
      if (el.value) {
        activeDate = new Date(el.value);
        updateActiveDateDisplay();
        loadMyTasks();
      }
    }

    // Convert file to base64 helper
    function getBase64(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = () => resolve(reader.result);
        reader.onerror = error => reject(error);
      });
    }

    // Embed Google Drive Preview Helper
    function getEmbedPreviewUrl(url) {
      if (!url) return '';
      const match = url.match(/drive\.google\.com\/file\/d\/([^\/]+)/);
      if (match && match[1]) {
        return `https://drive.google.com/file/d/${match[1]}/preview`;
      }
      return url;
    }

    // Show Custom Toast Notification
    function showToastMsg(msg) {
      const toast = document.getElementById('toastEl');
      toast.innerText = msg;
      toast.style.display = 'block';
      setTimeout(() => {
        toast.style.display = 'none';
      }, 3000);
    }

    // Submit New Task Reporting
    async function submitTask(e) {
      e.preventDefault();
      const taskName = document.getElementById('taskName').value.trim();
      const target = document.getElementById('taskTarget').value.trim();
      const startTime = document.getElementById('taskStartTime').value;
      const endTime = document.getElementById('taskEndTime').value;
      const output = document.getElementById('taskOutput').value.trim();
      const statusToggle = document.getElementById('taskStatusToggle');
      const status = statusToggle.checked ? 'Completed' : 'Pending';

      const notes = document.getElementById('taskNotes').value.trim();
      const others = document.getElementById('taskOthers').value.trim();
      const fileInput = document.getElementById('taskFile');

      const submitBtn = e.target.querySelector('button[type="submit"]');
      const originalText = submitBtn.innerHTML;
      submitBtn.disabled = true;
      submitBtn.innerHTML = '<i class="bi bi-hourglass-split spin"></i> Mengirim...';

      let attachment_base64 = '';
      let attachment_filename = '';

      if (fileInput.files.length > 0) {
        const file = fileInput.files[0];
        attachment_filename = file.name;
        try {
          attachment_base64 = await getBase64(file);
        } catch (err) {
          console.error("Failed to read file", err);
        }
      }

      const payload = {
        action: 'createTask',
        user_id: currentUser.user_id,
        date: activeDate.toISOString().substring(0, 10),
        task_name: taskName,
        target_goals: target,
        start_time: startTime,
        end_time: endTime,
        output: output,
        status: status,
        notes: notes,
        others: others,
        category: 'Other',
        attachment_base64: attachment_base64,
        attachment_filename: attachment_filename
      };

      try {
        const res = await fetch(APPS_SCRIPT_URL, {
          method: 'POST',
          body: JSON.stringify(payload)
        });
        const data = await res.json();
        if (data.success) {
          showToastMsg('Laporan tugas berhasil disimpan!');
          document.getElementById('taskForm').reset();
          document.getElementById('taskStatusToggle').checked = false;
          updateToggleLabel(document.getElementById('taskStatusToggle'), 'form-status-label-left', 'form-status-label-right');
          switchTab('history');
        } else {
          showToastMsg(data.message || 'Gagal mengirim tugas');
        }
      } catch (err) {
        console.error(err);
        showToastMsg('Terjadi kesalahan koneksi');
      } finally {
        submitBtn.disabled = false;
        submitBtn.innerHTML = originalText;
      }
    }

    // Load My Tasks History
    async function loadMyTasks() {
      const container = document.getElementById('taskListContainer');
      container.innerHTML = `
        <div style="text-align:center; padding:30px; color:var(--text-muted)">
          <i class="bi bi-arrow-repeat spin" style="font-size:24px; display:inline-block; margin-bottom:8px;"></i>
          Memuat tugas Anda...
        </div>
      `;

      const targetDateStr = activeDate.toISOString().substring(0, 10);

      try {
        const res = await fetch(`${APPS_SCRIPT_URL}?action=getTasks&user_id=${currentUser.user_id}&start_date=${targetDateStr}&end_date=${targetDateStr}`);
        const data = await res.json();

        if (data.success && data.tasks) {
          currentTasksList = data.tasks;
          renderFilteredTasks();
        } else {
          currentTasksList = [];
          renderFilteredTasks();
        }
      } catch (err) {
        console.error(err);
        container.innerHTML = `
          <div class="card" style="text-align:center; padding:30px; color:var(--danger);">
            <i class="bi bi-exclamation-triangle" style="font-size:24px; display:block; margin-bottom:8px;"></i>
            Gagal menghubungkan ke server. Coba lagi.
          </div>
        `;
      }
    }

    // Filter Tasks Dynamically
    function filterByStatus(status) {
      selectedStatusFilter = status;
      document.querySelectorAll('.filter-status-btn').forEach(btn => {
        btn.className = 'btn btn-sm btn-ghost filter-status-btn';
      });
      const activeBtn = document.getElementById('filter-status-' + status);
      if (activeBtn) activeBtn.className = 'btn btn-sm btn-primary filter-status-btn';

      renderFilteredTasks();
    }

    // Render current tasks list
    function renderFilteredTasks() {
      const container = document.getElementById('taskListContainer');

      // Calculate Stats first for the Insight Card
      const totalTasks = currentTasksList.length;
      const completedTasks = currentTasksList.filter(t => t.status === 'Completed').length;

      // Update Insight UI
      const percent = totalTasks > 0 ? Math.round((completedTasks / totalTasks) * 100) : 0;
      document.getElementById('insightText').textContent = `${completedTasks} / ${totalTasks} Tugas Selesai`;
      document.getElementById('insightProgress').style.width = percent + '%';
      document.getElementById('insightPercent').textContent = percent + '% Selesai';

      // Update motivational quote
      const quotes = [
        "Kerja cerdas untuk hari esok yang sukses! 🚀",
        "Luar biasa! Satu demi satu tugas selesai. 🌟",
        "Setiap progres kecil adalah pencapaian hebat! 👍",
        "Pertahankan ritme kerjamu! ⚡",
        "Selesaikan tugas hari ini dengan senyuman! 😊"
      ];
      const selectedQuote = percent === 100 ? "Luar biasa! Semua tugas selesai hari ini! 🎉" : quotes[completedTasks % quotes.length];
      document.getElementById('insightMotivation').textContent = selectedQuote;

      // Filter tasks list
      let filtered = currentTasksList;
      if (selectedStatusFilter !== 'all') {
        filtered = currentTasksList.filter(t => t.status === selectedStatusFilter);
      }

      if (filtered.length > 0) {
        container.innerHTML = filtered.map(t => {
          const statusBadge = t.status === 'Completed' ? 'badge-success' : 'badge-warn';
          const statusTranslation = t.status === 'Completed' ? 'Selesai' : 'Belum Selesai';
          const taskJsonStr = encodeURIComponent(JSON.stringify(t));

          return `
            <div class="task-minimal-card fade-in">
              <div style="display:flex; justify-content:space-between; align-items:center;">
                <span class="badge ${statusBadge}">${statusTranslation}</span>
                <span style="font-size:11px; color:var(--text-muted); font-weight:700;"><i class="bi bi-clock-fill" style="margin-right:4px;"></i>${t.start_time || '—'} - ${t.end_time || '—'}</span>
              </div>
              
              <h4 style="margin:2px 0 4px 0; font-size:14px; font-weight:800; color:var(--text); line-height:1.4;">${t.task_name}</h4>
              
              <div style="display:flex; gap:8px; margin-top:8px; border-top:1px dashed var(--border); padding-top:10px;">
                <button class="btn btn-sm btn-ghost" onclick="viewTaskDetail('${taskJsonStr}')" style="flex:1.2; padding:6px; font-size:11px; border-radius:10px; font-weight:600;"><i class="bi bi-eye"></i> Detail</button>
                <button class="btn btn-sm btn-primary" onclick="openEditTaskModal('${taskJsonStr}')" style="flex:1.2; padding:6px; font-size:11px; border-radius:10px; font-weight:600;"><i class="bi bi-pencil"></i> Edit</button>
                <button class="btn btn-sm btn-ghost text-danger" onclick="deleteTaskDirect('${t.task_id}')" style="width:34px; height:34px; padding:0; display:flex; align-items:center; justify-content:center; border-radius:10px; border-color:rgba(239, 68, 68, 0.2);"><i class="bi bi-trash"></i></button>
              </div>
            </div>
          `;
        }).join('');
      } else {
        container.innerHTML = `
          <div class="card" style="text-align:center; padding:45px 20px; color:var(--text-muted);">
            <i class="bi bi-journal-x" style="font-size:36px; opacity:0.3; display:block; margin-bottom:12px;"></i>
            Tidak ada tugas dengan filter ini.
          </div>
        `;
      }
    }

    // View task detail popup
    function viewTaskDetail(taskJsonStr) {
      const t = JSON.parse(decodeURIComponent(taskJsonStr));
      const body = document.getElementById('viewTaskBody');
      const attachmentHTML = t.attachment_url ? `
        <div style="margin-top:8px;">
          <strong style="color:var(--text); display:block; margin-bottom:6px;">Lampiran Dokumen:</strong>
          <button class="btn btn-sm btn-ghost" onclick="previewAttachment('${t.attachment_url}')" style="display:inline-flex; align-items:center; gap:6px; background:rgba(255,255,255,0.06); padding:6px 12px; border-radius:30px; font-size:11px; width:fit-content; cursor:pointer;">
            <i class="bi bi-file-earmark-arrow-up-fill text-primary" style="font-size:14px;"></i> Lihat Preview Lampiran
          </button>
        </div>
      ` : '';

      body.innerHTML = `
        <div style="border-bottom:1px solid var(--border); padding-bottom:10px;">
          <strong style="color:var(--text); font-size:14px;">${t.task_name}</strong>
        </div>
        <div>
          <strong style="color:var(--text)">Target / Goals:</strong>
          <p style="margin:4px 0 0 0; color:var(--text-muted);">${t.target_goals || '—'}</p>
        </div>
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
          <div>
            <strong style="color:var(--text)">Waktu Mulai:</strong>
            <p style="margin:4px 0 0 0; color:var(--text-muted); font-weight:700;">${t.start_time || '—'}</p>
          </div>
          <div>
            <strong style="color:var(--text)">Waktu Selesai:</strong>
            <p style="margin:4px 0 0 0; color:var(--text-muted); font-weight:700;">${t.end_time || '—'}</p>
          </div>
        </div>
        <div>
          <strong style="color:var(--text)">Output Yang Dihasilkan:</strong>
          <p style="margin:4px 0 0 0; color:var(--text-muted);">${t.output || '—'}</p>
        </div>
        <div>
          <strong style="color:var(--text)">Status:</strong>
          <div style="margin-top:4px;"><span class="badge ${t.status === 'Completed' ? 'badge-success' : 'badge-warn'}">${t.status === 'Completed' ? 'Selesai' : 'Belum Selesai'}</span></div>
        </div>
        <div>
          <strong style="color:var(--text)">Catatan / Issue:</strong>
          <p style="margin:4px 0 0 0; color:var(--text-muted); white-space:pre-line;">${t.notes || '—'}</p>
        </div>
        <div>
          <strong style="color:var(--text)">Info Lainnya:</strong>
          <p style="margin:4px 0 0 0; color:var(--text-muted); white-space:pre-line;">${t.others || '—'}</p>
        </div>
        ${t.score ? `
          <div style="background:rgba(59,130,246,0.1); border:1px solid rgba(59,130,246,0.2); border-radius:12px; padding:10px 14px; display:flex; align-items:center; gap:8px;">
            <i class="bi bi-star-fill text-primary" style="font-size:16px;"></i>
            <div>
              <strong style="color:var(--primary); font-size:12px; display:block;">Productivity Score</strong>
              <span style="font-weight:800; font-size:14px; color:var(--text);">${t.score} / 100</span>
            </div>
          </div>
        ` : ''}
        ${attachmentHTML}
      `;

      openModal('modalViewTask');
    }

    // Preview attachment in modal previewer
    function previewAttachment(url) {
      const body = document.getElementById('previewBody');
      const embedUrl = getEmbedPreviewUrl(url);

      body.innerHTML = `
        <iframe src="${embedUrl}" id="previewIframe" allow="autoplay"></iframe>
      `;

      openModal('modalPreview');
    }

    // Open edit task modal
    function openEditTaskModal(taskJsonStr) {
      const t = JSON.parse(decodeURIComponent(taskJsonStr));

      document.getElementById('editTaskId').value = t.task_id;
      document.getElementById('editTaskName').value = t.task_name || '';
      document.getElementById('editTaskTarget').value = t.target_goals || '';
      document.getElementById('editTaskStartTime').value = t.start_time || '';
      document.getElementById('editTaskEndTime').value = t.end_time || '';
      document.getElementById('editTaskOutput').value = t.output || '';

      const statusToggle = document.getElementById('editTaskStatusToggle');
      statusToggle.checked = t.status === 'Completed';
      updateToggleLabel(statusToggle, 'edit-status-label-left', 'edit-status-label-right');

      document.getElementById('editTaskNotes').value = t.notes || '';
      document.getElementById('editTaskOthers').value = t.others || '';
      document.getElementById('editTaskFile').value = ''; // Reset file input

      openModal('modalEditTask');
    }

    // Submit task edits
    async function submitEditTask(e) {
      e.preventDefault();
      const taskId = document.getElementById('editTaskId').value;
      const taskName = document.getElementById('editTaskName').value.trim();
      const target = document.getElementById('editTaskTarget').value.trim();
      const startTime = document.getElementById('editTaskStartTime').value;
      const endTime = document.getElementById('editTaskEndTime').value;
      const output = document.getElementById('editTaskOutput').value.trim();

      const statusToggle = document.getElementById('editTaskStatusToggle');
      const status = statusToggle.checked ? 'Completed' : 'Pending';

      const notes = document.getElementById('editTaskNotes').value.trim();
      const others = document.getElementById('editTaskOthers').value.trim();
      const fileInput = document.getElementById('editTaskFile');

      const submitBtn = document.getElementById('editSubmitBtn');
      const originalText = submitBtn.innerHTML;
      submitBtn.disabled = true;
      submitBtn.innerHTML = '<i class="bi bi-hourglass-split spin"></i> Menyimpan...';

      let attachment_base64 = '';
      let attachment_filename = '';

      if (fileInput.files.length > 0) {
        const file = fileInput.files[0];
        attachment_filename = file.name;
        try {
          attachment_base64 = await getBase64(file);
        } catch (err) {
          console.error("Failed to read file", err);
        }
      }

      const payload = {
        action: 'updateTask',
        task_id: taskId,
        task_name: taskName,
        target_goals: target,
        start_time: startTime,
        end_time: endTime,
        output: output,
        status: status,
        notes: notes,
        others: others,
        category: 'Other',
        attachment_base64: attachment_base64 || undefined,
        attachment_filename: attachment_filename || undefined
      };

      try {
        const res = await fetch(APPS_SCRIPT_URL, {
          method: 'POST',
          body: JSON.stringify(payload)
        });
        const data = await res.json();
        if (data.success) {
          showToastMsg('Tugas berhasil diperbarui!');
          closeModal('modalEditTask');
          loadMyTasks();
        } else {
          showToastMsg(data.message || 'Gagal memperbarui tugas');
        }
      } catch (err) {
        console.error(err);
        showToastMsg('Terjadi kesalahan koneksi');
      } finally {
        submitBtn.disabled = false;
        submitBtn.innerHTML = originalText;
      }
    }

    // Delete task direct quick action
    function deleteTaskDirect(taskId) {
      customConfirm('Apakah Anda yakin ingin menghapus tugas ini secara permanen?', async () => {
        showToastMsg('Sedang menghapus...');
        try {
          const res = await fetch(APPS_SCRIPT_URL, {
            method: 'POST',
            body: JSON.stringify({ action: 'deleteTask', task_id: taskId })
          });
          const data = await res.json();
          if (data.success) {
            showToastMsg('Tugas berhasil dihapus!');
            loadMyTasks();
          } else {
            showToastMsg(data.message || 'Gagal menghapus tugas');
          }
        } catch (err) {
          console.error(err);
          showToastMsg('Terjadi kesalahan koneksi');
        }
      });
    }
  </script>
</body>

</html>
