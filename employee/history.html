<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>JEF HRIS — Riwayat Kehadiran</title>
  <meta name="theme-color" content="#FFB703">
  <link rel="icon" type="image/png" href="../img/logomark.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800;900&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap"
    rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
  <link rel="manifest" href="/json/manifest.json">
</head>

<body class="history-page">

  <div class="wrap-employee">
    <div class="header">
      <div style="display:flex; align-items:center; gap:14px;">
        <button class="back-btn" onclick="goBack()"><i class="bi bi-arrow-left"></i></button>
        <div class="header-info">
          <h2>Riwayat Kehadiran</h2>
          <p>Catatan Absensi Anda</p>
        </div>
      </div>
      <div style="display:flex; align-items:center; gap:8px;">
        <button class="theme-toggle-btn" id="themeToggleBtn" onclick="toggleTheme()" title="Ganti Mode"
          style="background:rgba(255,255,255,0.08); border:1px solid var(--border); border-radius:50%; width:36px; height:36px; display:flex; align-items:center; justify-content:center; color:var(--text); font-size:16px; transition: all var(--transition); cursor:pointer;">
          <i class="bi bi-sun-fill"></i>
        </button>
        <button class="btn-logout" onclick="logout()"><i class="bi bi-box-arrow-right"></i> Keluar</button>
      </div>
    </div>

    <div class="content">
      <div class="filter-chips">
        <div class="filter-chip active" onclick="filterHistory('all', this)">Semua</div>
        <div class="filter-chip" onclick="filterHistory('on-time', this)">Tepat Waktu</div>
        <div class="filter-chip" onclick="filterHistory('late', this)">Terlambat</div>
      </div>

      <div class="section-label">Riwayat Kehadiran</div>
      <div class="history-list" id="historyList">
        <div class="loading-state">
          <div class="spinner-lg"></div>
          <p>Memuat riwayat kehadiran...</p>
        </div>
      </div>
    </div>

    <nav class="bottom-nav">
      <a href="/employee/beranda.html" class="nav-item">
        <i class="bi bi-house-fill"></i>Beranda
      </a>
      <a href="/employee/attendance.html" class="nav-item">
        <i class="bi bi-person-check-fill"></i>Absensi
      </a>
      <a href="/employee/tasks.html" class="nav-item">
        <i class="bi bi-list-task"></i>Tugas
      </a>
      <a href="/employee/leave.html" class="nav-item">
        <i class="bi bi-calendar-check-fill"></i>Pengajuan
      </a>
      <a href="/employee/history.html" class="nav-item active">
        <i class="bi bi-clock-fill"></i>Riwayat
      </a>
    </nav>
  </div>
  <script src="/js/script.js"></script>
</body>

</html>
