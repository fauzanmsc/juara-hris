<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>JEF HRIS — Pengajuan</title>
  <meta name="theme-color" content="#FFB703">
  <link rel="icon" type="image/png" href="../img/logomark.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800;900&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap"
    rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
  <link rel="manifest" href="/json/manifest.json">
</head>

<body class="leave-page">
  <div class="wrap-employee">
    <div class="header">
      <div style="display:flex; align-items:center; gap:14px;">
        <a href="/employee/beranda.html" class="back-btn"><i class="bi bi-arrow-left"></i></a>
        <div class="header-info">
          <h2>Pengajuan</h2>
          <p>Cuti, Sakit &amp; Izin</p>
        </div>
      </div>
      <div style="display:flex; align-items:center; gap:8px;">
        <button class="theme-toggle-btn" id="themeToggleBtn" onclick="toggleTheme()" title="Ganti Mode"
          style="background:rgba(255,255,255,0.08); border:1px solid var(--border); border-radius:50%; width:36px; height:36px; display:flex; align-items:center; justify-content:center; color:var(--text); font-size:16px; transition: all var(--transition); cursor:pointer;">
          <i class="bi bi-sun-fill"></i>
        </button>
        <button class="btn-logout" onclick="logout()"><i class="bi bi-box-arrow-right"></i> Keluar</button>
      </div>
    </div>

    <div class="tabs">
      <div class="tab-item active" id="tab-form" onclick="switchTab('form')">Ajukan Baru</div>
      <div class="tab-item" id="tab-history" onclick="switchTab('history')">Riwayat Ajuan</div>
    </div>

    <div class="toast-lv" id="toastEl"></div>

    <div class="content">
      <!-- FORM TAB -->
      <div class="form-section active" id="tabForm">
        <div class="info-note">
          <i class="bi bi-info-circle-fill"></i>
          Pengajuan yang disetujui akan otomatis mengunci tombol absensi pada tanggal yang dipilih.
        </div>

        <!-- TYPE -->
        <div class="form-group">
          <label class="form-label">Jenis Pengajuan</label>
          <div class="type-grid">
            <div class="type-card sel-cuti" id="type-Cuti" onclick="selectType('Cuti')">
              <div class="type-icon-wrap"
                style="background: rgba(34, 197, 94, 0.08); box-shadow: var(--shadow-neu-inset); border: 1px solid rgba(34, 197, 94, 0.15);">
                <i class="bi bi-calendar-check-fill" style="color: #22C55E; font-size: 20px;"></i>
              </div>
              <div class="type-name">Cuti</div>
              <div class="type-desc">Cuti tahunan</div>
            </div>
            <div class="type-card" id="type-Sakit" onclick="selectType('Sakit')">
              <div class="type-icon-wrap"
                style="background: rgba(239, 68, 68, 0.06); box-shadow: var(--shadow-neu-inset); border: 1px solid rgba(239, 68, 68, 0.12);">
                <i class="bi bi-heart-pulse-fill" style="color: #EF4444; font-size: 20px;"></i>
              </div>
              <div class="type-name">Sakit</div>
              <div class="type-desc">Butuh dokumen</div>
            </div>
            <div class="type-card" id="type-Izin" onclick="selectType('Izin')">
              <div class="type-icon-wrap"
                style="background: rgba(59, 130, 246, 0.06); box-shadow: var(--shadow-neu-inset); border: 1px solid rgba(59, 130, 246, 0.12);">
                <i class="bi bi-file-earmark-text-fill" style="color: #3B82F6; font-size: 20px;"></i>
              </div>
              <div class="type-name">Izin</div>
              <div class="type-desc">Keperluan lain</div>
            </div>
          </div>
          <input type="hidden" id="selectedType" value="Cuti">
        </div>

        <div class="form-group">
          <label class="form-label">Tanggal Mulai</label>
          <input type="date" id="startDate" class="form-input" onchange="updateDateRange()">
        </div>
        <div class="form-group">
          <label class="form-label">Tanggal Selesai</label>
          <input type="date" id="endDate" class="form-input" onchange="updateDateRange()">
          <div class="date-range-info" id="dateRangeInfo"></div>
        </div>
        <div class="form-group">
          <label class="form-label">Alasan / Keterangan</label>
          <textarea id="reason" class="form-input" placeholder="Jelaskan alasan pengajuan Anda..."></textarea>
        </div>

        <!-- UPLOAD (Sakit) -->
        <div class="form-group" id="uploadSection" style="display:none">
          <label class="form-label">Dokumen Pendukung <span style="color:var(--danger)">*</span></label>
          <div class="upload-area">
            <input type="file" id="fileInput" accept="image/*,application/pdf" onchange="handleFile(this)">
            <i class="bi bi-file-earmark-arrow-up"></i>
            <div class="upload-text">Tap untuk pilih foto / dokumen<br><span>dari kamera atau galeri</span></div>
          </div>
          <div class="upload-preview" id="uploadPreview">
            <img id="previewImg" src="" alt="">
            <div>
              <strong style="font-size:13px" id="fileName">—</strong>
              <div style="font-size:11px;color:var(--text-muted);margin-top:2px" id="fileSize">—</div>
            </div>
            <span class="del-upload" onclick="clearFile()"><i class="bi bi-x-circle-fill"></i></span>
          </div>
        </div>

        <button class="btn-submit" id="submitBtn" onclick="submitLeave()">
          <i class="bi bi-send-fill"></i> KIRIM PENGAJUAN
        </button>
      </div>

      <!-- HISTORY TAB -->
      <div class="form-section" id="tabHistory">
        <div class="section-label">Riwayat Pengajuan</div>
        <div class="history-list" id="historyList">
          <div style="text-align:center;padding:40px 0;color:var(--text-muted)">
            <i class="bi bi-hourglass-split" style="font-size:36px;opacity:.4;display:block;margin-bottom:12px"></i>
            Memuat riwayat...
          </div>
        </div>
      </div>
    </div>

    <!-- BOTTOM NAV -->

  </div>
  <script src="/js/script.js"></script>

</body>

</html>
